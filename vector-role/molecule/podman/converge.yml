---
- name: Converge
  hosts: all
  gather_facts: no
  tasks:
    - name: Update apt cache
      raw: apt-get update
      changed_when: false

    - name: Install Python and curl
      raw: apt-get install -y python3 python3-apt curl procps
      changed_when: false

    - name: Gather facts
      setup:

    - name: Download Vector install script
      raw: curl -k -L -o /tmp/install_vector.sh https://sh.vector.dev
      changed_when: false

    - name: Install Vector
      raw: bash /tmp/install_vector.sh -y
      changed_when: false
      args:
        creates: /root/.vector/bin/vector

    - name: Create config directory
      file:
        path: /etc/vector
        state: directory
        mode: '0755'

    - name: Create data directory
      file:
        path: /var/lib/vector
        state: directory
        mode: '0755'

    - name: Copy Vector config
      copy:
        content: |
          data_dir = "/var/lib/vector"

          [sources.demo_log]
          type = "demo_logs"
          format = "apache_common"

          [sinks.print]
          type = "console"
          inputs = ["demo_log"]
          encoding.codec = "text"
        dest: /etc/vector/vector.toml

    - name: Create PID directory
      file:
        path: /root/.vector
        state: directory
        mode: '0755'

    - name: Check if Vector is running via PID file
      stat:
        path: /root/.vector/vector.pid
      register: pid_file
      changed_when: false

    - name: Start Vector with PID file
      command: /root/.vector/bin/vector --config /etc/vector/vector.toml
      async: 10
      poll: 0
      when: not pid_file.stat.exists

    - name: Save Vector PID
      shell: pgrep vector | head -1 > /root/.vector/vector.pid
      when: not pid_file.stat.exists
      changed_when: false
